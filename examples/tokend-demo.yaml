tokenizers:
  - model: "Qwen/Qwen3-8B"
    source: "huggingface"

server:
  http_port: 8765
  grpc_port: 8766

ext_proc:
  enabled: true
  port: 8767
  intercept_paths:
    - "/v1/chat/completions"
    - "/chat/completions"
    - "/v1/completions"
    - "/completions"
  mode: "both"
  token_count_header: "x-tokend-token-count"
  model_header: "x-tokend-model"
  inject_tokens: true

cache_dir: "/var/cache/tokend"
hf_token: "${HF_TOKEN}"
